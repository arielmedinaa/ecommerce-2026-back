apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2 # Amazon Linux 2
  role: "KarpenterNodeRole-MiClusterEcommerce" # Reemplazar por el rol IAM de los nodos que Karpenter puede usar
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "mi-cluster-ecommerce" # Se configura en las VPC/Subnets de AWS EKS
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "mi-cluster-ecommerce" # Se configura en los SecurityGroups
