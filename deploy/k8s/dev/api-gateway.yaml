apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: api-gateway-dev:latest
        imagePullPolicy: Never # Usa imagenes locales en minikube
        ports:
        - containerPort: 3100
        envFrom:
        - configMapRef:
            name: ecommerce-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 3100
      targetPort: 3100
  type: ClusterIP
