apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        # -js habilita JetStream (durabilidad opcional; el RPC request/reply de NestJS
        # no lo requiere). -m 8222 habilita el endpoint HTTP de monitoreo (varz/connz/subsz).
        args: ["-js", "-m", "8222"]
        ports:
        - containerPort: 4222   # cliente
        - containerPort: 8222   # monitoreo HTTP
        readinessProbe:
          tcpSocket:
            port: 4222
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 4222
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nats
spec:
  selector:
    app: nats
  ports:
  - name: client
    protocol: TCP
    port: 4222
    targetPort: 4222
  - name: monitor
    protocol: TCP
    port: 8222
    targetPort: 8222
  type: ClusterIP
