apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: default
data:
  NODE_ENV: "development"
  IS_DOCKER: "true"
  RUN_MODE: "all"
  LOG_FORMAT: "json"
  
  # API Gateway
  PORT: "3100"
  GATEWAY_PORT: "3100"
  CORS_ORIGIN: "http://localhost:5173"
  
  # Microservices Ports
  AUTH_PORT: "3101"
  CART_PORT: "3102"
  CONTENT_PORT: "3103"
  PAYMENTS_PORT: "3105"
  PRODUCTS_PORT: "3106"
  IMAGE_PORT: "3107"

  # Internal Dns URLs (Kubernetes Service Names)
  AUTH_SERVICE_URL: "auth-service"
  CART_SERVICE_URL: "cart-service"
  CONTENT_SERVICE_URL: "content-service"
  PAYMENTS_SERVICE_URL: "payments-service"
  PRODUCTS_SERVICE_URL: "products-service"
  IMAGE_SERVICE_URL: "image-service"

  # Database (Local dev: mariadb Service)
  DATABASE_HOST: "mariadb"
  DATABASE_PORT: "3306"
  DATABASE_USER: "ecommerce"
  DATABASE_PASSWORD: "ecommerce"
  DATABASE_NAME: "ecommerce"
  SYNCRONICE: "false"
  DB_RETRY_ATTEMPTS: "30"
  DB_RETRY_DELAY_MS: "3000"
  DB_CONNECT_TIMEOUT_MS: "10000"

  # Google OAuth (optional; leave blank to disable)
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GOOGLE_CALLBACK_URL: "http://localhost:3101/auth/google/callback"

  # LocalStack (in-cluster)
  SQS_ENDPOINT: "http://localstack.localstack.svc.cluster.local:4566"
  AWS_REGION: "us-east-1"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  PAYMENTS_SQS_QUEUE_NAME: "payments-jobs"
  PAYMENTS_SQS_WORKER_ENABLED: "true"
