# NATS para el transporte inter-servicio (RPC request/reply) en producción.
# Para alta disponibilidad conviene un NATS cluster (3 nodos) con JetStream;
# este Deployment single-pod es la base funcional.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: ecommerce-prod
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        args: ["-js", "-m", "8222"]
        ports:
        - containerPort: 4222
        - containerPort: 8222
        readinessProbe:
          tcpSocket:
            port: 4222
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 4222
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: ecommerce-prod
spec:
  selector:
    app: nats
  ports:
  - name: client
    protocol: TCP
    port: 4222
    targetPort: 4222
  - name: monitor
    protocol: TCP
    port: 8222
    targetPort: 8222
  type: ClusterIP
