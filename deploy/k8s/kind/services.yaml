apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ecommerce-kind
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service-dev:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3101
          envFrom:
            - configMapRef:
                name: ecommerce-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ecommerce-kind
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 3101
      targetPort: 3101
  type: ClusterIP
---
