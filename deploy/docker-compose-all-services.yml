# Stack local CANÓNICO — espeja la arquitectura ECS Fargate (NATS + Redis + DB-per-service).
# Levantar con: make compose-up   (o: docker compose -f deploy/docker-compose-all-services.yml up --build)
#
# Equivalencias con AWS:
#   nginx-lb  ≈ ALB        | mariadb ≈ RDS        | redis ≈ ElastiCache
#   nats      = el bus     | localstack ≈ S3+SQS  | cada service ≈ un ECS Service
# ECONT (ERP on-prem, 192.168.100.100) es real → products lo usa vía .env.local.

services:
  # --- Infra ---
  nginx-lb:                              # ≈ ALB (entrada pública en :3100)
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '3100:80'
    depends_on:
      - api-gateway
    networks:
      - app-network

  nats:                                  # bus de mensajería (RPC entre servicios)
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]       # JetStream + endpoint de monitoreo
    ports:
      - '4222:4222'
      - '8222:8222'                       # http://localhost:8222/connz
    networks:
      - app-network

  redis:                                 # caché (cart, products)
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no"]
    ports:
      - '6379:6379'
    networks:
      - app-network

  mariadb:                               # DB de aplicación (schemas por servicio)
    image: mariadb:10.11
    command: ["--max_connections=500"]
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ecommerce
      MARIADB_USER: ecommerce
      MARIADB_PASSWORD: ecommerce
    ports:
      - '3307:3306'   # host 3307 (3306 suele estar ocupado); interno sigue 3306
    volumes:
      - mariadb_data:/var/lib/mysql
      # Crea schemas (01-schemas.sql) y carga datos (02-seed.sql, si existe) en el primer boot.
      - ./local/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network

  localstack:                            # ≈ S3 + SQS
    image: localstack/localstack:3.5
    environment:
      - SERVICES=s3,sqs,cloudfront,iam,sts
      - DEBUG=${LOCALSTACK_DEBUG:-0}
    ports:
      - '4566:4566'
    networks:
      - app-network

  # --- Microservicios (cada uno = un ECS Service) ---
  api-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dev
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_FORMAT=json
      - PORT=3100
      - GATEWAY_PORT=3100
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - IS_DOCKER=true
      - RUN_MODE=all
      - JWT_SECRET=${JWT_SECRET:-ecommerce-back-2026-central-shop-api-ecommerce}
      - NATS_URL=nats://nats:4222
    volumes:
      - ../:/usr/src/app
      - /usr/src/app/node_modules
    command: yarn start:dev:gateway
    depends_on:
      - nats
      - auth
      - products
      - cart
      - content
      - payments
      - image
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  auth:
    build:
      context: ..
      dockerfile: microservices/auth/container/Dockerfile.dev
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_FORMAT=json
      - IS_DOCKER=true
      - RUN_MODE=all
      - JWT_SECRET=${JWT_SECRET:-ecommerce-back-2026-central-shop-api-ecommerce}
      - NATS_URL=nats://nats:4222
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=ecommerce
      - DATABASE_PASSWORD=ecommerce
      - DATABASE_NAME=auth_db
      - DATABASE_HOST_REPLIC=mariadb
      - DATABASE_PORT_REPLIC=3306
      - DATABASE_USER_REPLIC=ecommerce
      - DATABASE_PASSWORD_REPLIC=ecommerce
      - DATABASE_NAME_REPLIC=auth_db
    volumes:
      - ../:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/microservices/auth/node_modules
    command: yarn start:dev:auth
    depends_on:
      - nats
      - mariadb
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  products:
    build:
      context: ..
      dockerfile: microservices/products/container/Dockerfile.dev
    env_file:
      - ./.env.local              # ECONT_DB_* (ERP on-prem real)
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_FORMAT=json
      - IS_DOCKER=true
      - RUN_MODE=all
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379
      # Conexión "ecommerce" (DB local): productos_imagenes / ofertas / producto_ofertas
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=ecommerce
      - DATABASE_PASSWORD=ecommerce
      - DATABASE_NAME=ecommerce
      - DATABASE_HOST_REPLIC=mariadb
      - DATABASE_PORT_REPLIC=3306
      - DATABASE_USER_REPLIC=ecommerce
      - DATABASE_PASSWORD_REPLIC=ecommerce
      - DATABASE_NAME_REPLIC=ecommerce
      # Imágenes en S3 (LocalStack)
      - IMAGE_STORAGE_PROVIDER=s3
      - IMAGE_S3_ENDPOINT=http://localstack:4566
      - IMAGE_S3_BUCKET=${IMAGE_S3_BUCKET:-ecommerce-images}
      - IMAGE_S3_ENSURE_BUCKET=true
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ../:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/microservices/products/node_modules
      - ../imagesEcommerce:/home/appuser/Documents/projects/newEcommerce2026/imagesEcommerce
    command: yarn start:dev:products
    depends_on:
      - nats
      - redis
      - mariadb
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cart:
    build:
      context: ..
      dockerfile: microservices/cart/container/Dockerfile.dev
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_FORMAT=json
      - IS_DOCKER=true
      - RUN_MODE=all
      - JWT_SECRET=${JWT_SECRET:-ecommerce-back-2026-central-shop-api-ecommerce}
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=ecommerce
      - DATABASE_PASSWORD=ecommerce
      - DATABASE_NAME=cart_db
      - DATABASE_HOST_REPLIC=mariadb
      - DATABASE_PORT_REPLIC=3306
      - DATABASE_USER_REPLIC=ecommerce
      - DATABASE_PASSWORD_REPLIC=ecommerce
      - DATABASE_NAME_REPLIC=cart_db
    volumes:
      - ../:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/microservices/cart/node_modules
    command: yarn start:dev:cart
    depends_on:
      - nats
      - redis
      - mariadb
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  content:
    build:
      context: ..
      dockerfile: microservices/content/container/Dockerfile.dev
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_FORMAT=json
      - IS_DOCKER=true
      - RUN_MODE=all
      - NATS_URL=nats://nats:4222
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=ecommerce
      - DATABASE_PASSWORD=ecommerce
      - DATABASE_NAME=content_db
      - DATABASE_HOST_REPLIC=mariadb
      - DATABASE_PORT_REPLIC=3306
      - DATABASE_USER_REPLIC=ecommerce
      - DATABASE_PASSWORD_REPLIC=ecommerce
      - DATABASE_NAME_REPLIC=content_db
    volumes:
      - ../:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/microservices/content/node_modules
    command: yarn start:dev:content
    depends_on:
      - nats
      - mariadb
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  payments:
    build:
      context: ..
      dockerfile: microservices/payments/container/Dockerfile.dev
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_FORMAT=json
      - IS_DOCKER=true
      - RUN_MODE=all
      - NATS_URL=nats://nats:4222
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=ecommerce
      - DATABASE_PASSWORD=ecommerce
      - DATABASE_NAME=payments_db
      - DATABASE_HOST_REPLIC=mariadb
      - DATABASE_PORT_REPLIC=3306
      - DATABASE_USER_REPLIC=ecommerce
      - DATABASE_PASSWORD_REPLIC=ecommerce
      - DATABASE_NAME_REPLIC=payments_db
      # SQS (LocalStack)
      - SQS_ENDPOINT=http://localstack:4566
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - PAYMENTS_SQS_QUEUE_NAME=${PAYMENTS_SQS_QUEUE_NAME:-payments-jobs}
      - PAYMENTS_SQS_WORKER_ENABLED=true
    volumes:
      - ../:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/microservices/payments/node_modules
    command: yarn start:dev:payments
    depends_on:
      - nats
      - mariadb
      - localstack
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  image:
    build:
      context: ..
      dockerfile: microservices/image/container/Dockerfile.dev
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_FORMAT=json
      - IS_DOCKER=true
      - RUN_MODE=all
      - NATS_URL=nats://nats:4222
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=ecommerce
      - DATABASE_PASSWORD=ecommerce
      - DATABASE_NAME=image_db
      - DATABASE_HOST_REPLIC=mariadb
      - DATABASE_PORT_REPLIC=3306
      - DATABASE_USER_REPLIC=ecommerce
      - DATABASE_PASSWORD_REPLIC=ecommerce
      - DATABASE_NAME_REPLIC=image_db
      # Imágenes en S3 (LocalStack)
      - IMAGE_STORAGE_PROVIDER=s3
      - IMAGE_S3_ENDPOINT=http://localstack:4566
      - IMAGE_S3_BUCKET=${IMAGE_S3_BUCKET:-ecommerce-images}
      - IMAGE_S3_KEY_PREFIX=${IMAGE_S3_KEY_PREFIX:-banners}
      - IMAGE_S3_ENSURE_BUCKET=true
      - IMAGE_S3_EXTERNAL_BASE_URL=${IMAGE_S3_EXTERNAL_BASE_URL:-http://localhost:4566/ecommerce-images}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ../:/usr/src/app
      - ../imagesEcommerce:/home/appuser/Documents/projects/newEcommerce2026/imagesEcommerce
      - /usr/src/app/node_modules
      - /usr/src/app/microservices/image/node_modules
    command: yarn start:dev:image
    depends_on:
      - nats
      - mariadb
      - localstack
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mariadb_data:

networks:
  app-network:
    driver: bridge
