apiVersion: apps/v1
kind: Deployment
metadata:
  name: products-service
  namespace: ecommerce-prod
  labels:
    app: products-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: products-service
  template:
    metadata:
      labels:
        app: products-service
    spec:
      containers:
      - name: products-service
        image: your-account-id.dkr.ecr.us-east-1.amazonaws.com/products-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3106
        envFrom:
        - configMapRef:
            name: ecommerce-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: products-service
  namespace: ecommerce-prod
spec:
  selector:
    app: products-service
  ports:
    - protocol: TCP
      port: 3106
      targetPort: 3106
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: products-service-hpa
  namespace: ecommerce-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: products-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
