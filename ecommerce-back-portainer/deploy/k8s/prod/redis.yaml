# Redis para caché distribuida en producción.
# Nota: para alta disponibilidad real conviene usar un servicio gestionado
# (AWS ElastiCache / Redis Cluster) y apuntar REDIS_URL ahí. Este Deployment
# single-pod sirve como base funcional.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ecommerce-prod
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        args:
        - "redis-server"
        - "--maxmemory"
        - "512mb"
        - "--maxmemory-policy"
        - "allkeys-lru"
        - "--save"
        - ""
        - "--appendonly"
        - "no"
        ports:
        - containerPort: 6379
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "640Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ecommerce-prod
spec:
  selector:
    app: redis
  ports:
  - name: redis
    protocol: TCP
    port: 6379
    targetPort: 6379
  type: ClusterIP
