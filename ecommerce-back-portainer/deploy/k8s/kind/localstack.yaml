apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  namespace: ecommerce-kind
  labels:
    app: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:3.5
          ports:
            - containerPort: 4566
          env:
            - name: SERVICES
              value: "sqs"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: DEBUG
              value: "0"
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: ecommerce-kind
spec:
  selector:
    app: localstack
  ports:
    - name: edge
      protocol: TCP
      port: 4566
      targetPort: 4566
  type: ClusterIP

