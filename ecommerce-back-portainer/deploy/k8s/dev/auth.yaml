apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: localhost/auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3101
        envFrom:
        - configMapRef:
            name: ecommerce-config
        # database-per-service: auth usa su propio schema (override sobre el configmap).
        env:
        - name: DATABASE_NAME
          value: "auth_db"
        - name: DATABASE_NAME_REPLIC
          value: "auth_db"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 3101
      targetPort: 3101
  type: ClusterIP
