apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  labels:
    app: cart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - name: cart-service
        image: localhost/cart-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3102
        envFrom:
        - configMapRef:
            name: ecommerce-config
        - secretRef:
            name: econt-db
        # database-per-service: cart usa su propio schema.
        env:
        - name: DATABASE_NAME
          value: "cart_db"
        - name: DATABASE_NAME_REPLIC
          value: "cart_db"
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
spec:
  selector:
    app: cart-service
  ports:
    - protocol: TCP
      port: 3102
      targetPort: 3102
  type: ClusterIP
