name: image-service
type: Backend Service

image:
  build:
    dockerfile: microservices/image/container/Dockerfile.dev
    context: .

cpu: 256
memory: 512
exec: true

count:
  range: 1-4
  cpu_percentage: 70

variables:
  NODE_ENV: production
  LOG_FORMAT: json
  NATS_URL: nats://nats.${COPILOT_ENVIRONMENT_NAME}.${COPILOT_APPLICATION_NAME}.local:4222
  DATABASE_HOST: REPLACE-rds-endpoint
  DATABASE_PORT: "3306"
  DATABASE_USER: ecommerce
  DATABASE_NAME: image_db
  DATABASE_HOST_REPLIC: REPLACE-rds-endpoint
  DATABASE_PORT_REPLIC: "3306"
  DATABASE_USER_REPLIC: ecommerce
  DATABASE_NAME_REPLIC: image_db
  IMAGE_STORAGE_PROVIDER: s3
  AWS_REGION: us-east-1
  IMAGE_S3_BUCKET: ecommerce-images
  IMAGE_S3_SIGNED_URLS: "true"

secrets:
  DATABASE_PASSWORD: DATABASE_PASSWORD
  DATABASE_PASSWORD_REPLIC: DATABASE_PASSWORD
