# products-service — interno (NATS). Catálogo. Tiene DOS bases:
#   1) ECONT (ERP legado, on-prem en …100.100) → artículos/stock/procs (web + v2).
#   2) ecommerce (RDS) → productos_imagenes, ofertas, producto_ofertas.
# Usa Redis (caché de listados/facets) y S3 (imágenes de producto).
name: products-service
type: Backend Service

image:
  build:
    dockerfile: microservices/products/container/Dockerfile.dev
    context: .

cpu: 512        # más CPU: corre procs pesados (v2 ~41k) + enriquecido
memory: 1024
exec: true

count:
  range: 1-6
  cpu_percentage: 70

variables:
  NODE_ENV: production
  LOG_FORMAT: json
  NATS_URL: nats://nats.${COPILOT_ENVIRONMENT_NAME}.${COPILOT_APPLICATION_NAME}.local:4222
  REDIS_URL: redis://REPLACE-elasticache-endpoint:6379
  # Conexión "ecommerce" (RDS): productos_imagenes / ofertas / producto_ofertas.
  DATABASE_HOST: REPLACE-rds-endpoint
  DATABASE_PORT: "3306"
  DATABASE_USER: ecommerce
  DATABASE_NAME: ecommerce
  DATABASE_HOST_REPLIC: REPLACE-rds-endpoint
  DATABASE_PORT_REPLIC: "3306"
  DATABASE_USER_REPLIC: ecommerce
  DATABASE_NAME_REPLIC: ecommerce
  # Conexión ECONT (ERP on-prem). OJO: es externa a AWS → requiere conectividad
  # (VPN / Direct Connect / peering) desde el VPC hacia …100.100.
  ECONT_DB_HOST: REPLACE-econt-host
  ECONT_DB_PORT: "3306"
  ECONT_DB_USER: REPLACE-econt-user
  ECONT_DB_DATABASE: ssss_emp1
  # Almacenamiento de imágenes de producto → S3 real.
  IMAGE_STORAGE_PROVIDER: s3
  AWS_REGION: us-east-1
  IMAGE_S3_BUCKET: ecommerce-images
  IMAGE_S3_SIGNED_URLS: "true"

secrets:
  DATABASE_PASSWORD: DATABASE_PASSWORD
  DATABASE_PASSWORD_REPLIC: DATABASE_PASSWORD
  ECONT_DB_PASSWORD: ECONT_DB_PASSWORD

# Nota: el acceso a S3 va por el Task Role (addon IAM en addons/), no por claves.
